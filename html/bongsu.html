<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봉수 (Bongsu) — Self-hosted Package Vulnerability Monitoring</title>
<style>
  :root{
    --bg:#0a0e14;
    --bg-soft:#0d1320;
    --panel:#121823;
    --panel-2:#161e2b;
    --border:#1f2937;
    --border-soft:#26303f;
    --text:#e6edf3;
    --muted:#9aa7b8;
    --muted-2:#6b7888;
    --accent:#ff7849;
    --accent-2:#ffb347;
    --accent-glow:rgba(255,120,73,.35);
    --green:#3fb950;
    --blue:#58a6ff;
    --radius:16px;
    --maxw:1140px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans KR","Noto Sans JP","Noto Sans SC",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .accent{color:var(--accent)}

  /* background glow */
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(255,120,73,.10), transparent 60%),
      radial-gradient(700px 500px at 10% 10%, rgba(88,166,255,.07), transparent 55%);
  }

  /* ---- nav ---- */
  nav{
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(12px);
    background:rgba(10,14,20,.72);
    border-bottom:1px solid var(--border);
  }
  .nav-inner{display:flex;align-items:center;gap:18px;height:64px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:.2px}
  .brand .sub{color:var(--muted-2);font-weight:500;font-size:13px;letter-spacing:1px}
  .nav-spacer{flex:1}
  .nav-links{display:flex;gap:24px;font-size:14px;color:var(--muted)}
  .nav-links a:hover{color:var(--text)}
  .gh-btn{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid var(--border-soft);border-radius:10px;
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);
    transition:border-color .2s,background .2s;
  }
  .gh-btn:hover{border-color:var(--accent);background:rgba(255,120,73,.08)}

  /* ---- language switcher ---- */
  .lang-switch{display:flex;gap:4px;flex-wrap:wrap}
  .lang-btn{
    background:transparent;border:1px solid var(--border-soft);
    color:var(--muted);border-radius:8px;padding:5px 9px;
    font-size:12px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .lang-btn:hover{color:var(--text);border-color:var(--muted-2)}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#1a0e07}

  /* ---- hero ---- */
  .hero{padding:84px 0 64px;text-align:center;position:relative}
  .logo-mark{margin:0 auto 28px;width:96px;height:96px;display:block;filter:drop-shadow(0 8px 28px var(--accent-glow))}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid var(--border-soft);border-radius:999px;
    padding:6px 14px;font-size:13px;color:var(--muted);margin-bottom:24px;
    background:var(--panel);
  }
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
  .hero h1{
    font-size:clamp(40px,7vw,72px);line-height:1.05;font-weight:800;
    letter-spacing:-1.5px;margin-bottom:8px;
  }
  .hero h1 .ko{
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .hero h1 .en{font-size:.42em;color:var(--muted);font-weight:600;letter-spacing:2px;display:block;margin-top:6px}
  .tagline{font-size:clamp(18px,2.6vw,24px);font-weight:600;color:var(--text);margin:22px auto 16px;max-width:760px}
  .hero p.desc{font-size:16px;color:var(--muted);max-width:680px;margin:0 auto 34px}
  .hero-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn-primary{
    background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#1a0e07;
    font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;
    box-shadow:0 8px 28px var(--accent-glow);transition:transform .15s;
  }
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{
    border:1px solid var(--border-soft);color:var(--text);font-weight:600;
    font-size:15px;padding:13px 26px;border-radius:12px;transition:.15s;
  }
  .btn-ghost:hover{border-color:var(--accent)}

  /* ---- origin ---- */
  .origin{
    margin:56px auto 0;max-width:820px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);border-radius:var(--radius);
    padding:26px 30px;display:flex;gap:20px;align-items:flex-start;text-align:left;
  }
  .origin .beacon{flex-shrink:0;width:54px;height:54px}
  .origin h3{font-size:15px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .origin p{font-size:15px;color:var(--muted)}

  /* ---- sections ---- */
  section.block{padding:72px 0}
  .section-head{text-align:center;max-width:720px;margin:0 auto 48px}
  .section-head .eyebrow{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .section-head h2{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-.6px;margin-bottom:14px}
  .section-head p{font-size:16px;color:var(--muted)}

  /* ---- why row ---- */
  .why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .why-card{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:26px 24px;transition:.2s;
  }
  .why-card:hover{border-color:var(--border-soft);transform:translateY(-3px)}
  .why-card .ic{font-size:22px;margin-bottom:14px;display:block}
  .why-card h4{font-size:17px;font-weight:700;margin-bottom:8px}
  .why-card p{font-size:14px;color:var(--muted)}

  /* ---- feature grid ---- */
  .feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .feat{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);border-radius:var(--radius);
    padding:24px 22px;transition:.2s;position:relative;overflow:hidden;
  }
  .feat::after{
    content:"";position:absolute;inset:0;border-radius:var(--radius);
    background:radial-gradient(160px 80px at 80% -10%,rgba(255,120,73,.10),transparent);
    opacity:0;transition:.25s;pointer-events:none;
  }
  .feat:hover{border-color:var(--accent);transform:translateY(-4px)}
  .feat:hover::after{opacity:1}
  .feat .fic{
    width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,120,73,.12);color:var(--accent);margin-bottom:16px;
  }
  .feat h4{font-size:16px;font-weight:700;margin-bottom:8px}
  .feat p{font-size:13.5px;color:var(--muted);line-height:1.6}

  /* ---- architecture ---- */
  .arch{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);border-radius:20px;padding:44px 36px;
  }
  .arch-flow{display:flex;align-items:stretch;gap:0;justify-content:center;flex-wrap:wrap}
  .arch-node{
    flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border-soft);
    border-radius:14px;padding:24px 20px;text-align:center;
  }
  .arch-node .an-ic{font-size:26px;margin-bottom:10px}
  .arch-node h4{font-size:16px;font-weight:700;margin-bottom:8px}
  .arch-node p{font-size:13px;color:var(--muted)}
  .arch-arrow{display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:24px;padding:0 14px;font-weight:700}
  .arch-foot{text-align:center;margin-top:26px;font-size:14px;color:var(--muted-2)}

  .src-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px}
  .src-chip{
    border:1px solid var(--border-soft);background:var(--bg);border-radius:999px;
    padding:7px 16px;font-size:13px;font-weight:600;color:var(--muted);
  }
  .src-chip b{color:var(--accent);font-weight:700}

  /* ---- footer ---- */
  footer{border-top:1px solid var(--border);padding:48px 0 40px;margin-top:40px}
  .foot-inner{display:flex;justify-content:space-between;gap:28px;flex-wrap:wrap;align-items:flex-start}
  .foot-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
  .foot-tag{color:var(--muted);font-size:14px;margin-top:10px;max-width:420px}
  .foot-links{display:flex;flex-direction:column;gap:9px;font-size:14px;color:var(--muted)}
  .foot-links a:hover{color:var(--accent)}
  .foot-bottom{margin-top:34px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted-2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

  @media(max-width:900px){
    .feat-grid{grid-template-columns:repeat(2,1fr)}
    .why-grid{grid-template-columns:1fr}
    .nav-links{display:none}
    .arch-arrow{transform:rotate(90deg);padding:10px 0}
    .arch-node{min-width:100%}
  }
  @media(max-width:560px){
    .feat-grid{grid-template-columns:1fr}
    .origin{flex-direction:column}
    .hero{padding:56px 0 40px}
  }
</style>

/* ============================================================
   i18n — all visible copy keyed by language code.
   Technical terms (CVE/OSV/NVD/EPSS/SBOM/RBAC/dpkg/rpm/apk)
   are kept as-is across all languages.
   ============================================================ */
const I18N = {
  ko:{
    "nav.why":"왜 봉수인가","nav.features":"기능","nav.arch":"아키텍처",

    "origin.title":"이름의 유래 — 烽燧臺",

    "why.c1.t":"외부 스캐너 의존성 없음","why.c1.d":"순수 Go 네이티브 스캐너가 dpkg·apk·rpm 데이터베이스를 직접 읽습니다. Trivy 바이너리 없이도 동작하는, 사실상 런타임 의존성 제로 설계입니다.",

    "why.c3.t":"자체 호스팅 · 에어갭 지원","why.c3.d":"데이터는 인프라 밖으로 나가지 않습니다. 오프라인 환경을 위한 CVE DB 번들 export/import와 stale 번들 거부 검증을 제공합니다.",
    "feat.eyebrow":"기능","feat.title":"감시에 필요한 모든 것","feat.subtitle":"OS 패키지부터 패키지 매니저 밖 런타임까지, 호스트와 컨테이너를 하나의 경로로 수집합니다.",
    "feat.native.t":"네이티브 스캐너","feat.native.d":"순수 Go로 dpkg status, apk installed DB를 직접 파싱하고 rpm은 호스트/컨테이너의 rpm 바이너리로 조회합니다. 동일한 ScanRoot 진입점이 호스트와 컨테이너 rootfs에 모두 쓰입니다.",
    "feat.fp.t":"낮은 오탐","feat.fp.d":"ecosystem 인식 버전 비교를 일반화된 규칙으로 구현했습니다. Debian backport 접미사 정렬, distro epoch 손실 허용, 버전 범위로 게이트되는 NVD CPE 매칭을 적용합니다.",
    "feat.runtime.t":"런타임 탐지","feat.runtime.d":"pyenv-Python, 풀어 놓은 Node, 손수 설치한 JDK·Go SDK 등 패키지 매니저 밖에 설치된 언어 런타임을 파일시스템 레이아웃으로 탐지합니다. 바이너리는 실행하지 않습니다.",
    "feat.facts.t":"호스트/컨테이너 facts","feat.facts.d":"/proc·/sys·/etc를 직접 읽어 CPU·메모리·DMI 하드웨어·가상화·네트워크·OS 정보를 JSONB로 수집하고, 대시보드의 System Facts 카드에서 투명하게 보여줍니다.",
    "feat.assignee.t":"담당자 워크플로","feat.assignee.d":"finding마다 담당자(assignee)를 지정·필터할 수 있고, 호스트 소유자 기반 자동 할당을 지원합니다. 취약점이 책임자에게 정확히 전달됩니다.",
    "feat.notify.t":"알림","feat.notify.d":"SMTP 이메일, webhook, 로그 채널을 지원합니다. 규칙별 수신자 설정과 scan.completed·scan.failed 트리거로 필요한 사람에게 경보를 보냅니다.",
    "feat.airgap.t":"에어갭 · 자체 호스팅","feat.airgap.d":"온라인은 시작 시와 6시간 주기로 자동 업데이트하고 실패 시 지수 backoff로 재시도합니다. 에어갭은 sha256 검증 번들로 offline import합니다.",

  en:{
    "nav.why":"Why Bongsu","nav.features":"Features","nav.arch":"Architecture",
    "hero.badge":"Self-hosted · No external scanner required",
    "hero.tagline":"A self-hosted platform that watches package vulnerabilities across every host and container",
    "hero.desc":"An agent on each host and container collects installed packages, and the server matches them against an authoritative CVE database. Like the beacon-fire towers it is named after, Bongsu relays each warning straight to the right person.",
    "hero.cta1":"View on GitHub","hero.cta2":"Explore features",
    "origin.title":"The name — 烽燧臺",
    "origin.body":"Bongsu is named after Korea's historical beacon-fire signal towers (봉수대, 烽燧臺), which relayed warnings of danger across the country with fire and smoke. When one tower spotted a threat, it passed the signal to the next, carrying the alarm swiftly nationwide — a fitting metaphor for a system that watches and immediately alerts.",
    "why.eyebrow":"Why Bongsu","why.title":"Fewer false positives, no blind spots","why.subtitle":"Accurate results from authoritative data, with no reliance on an external scanner — and your data never leaves your infrastructure.",
    "why.c1.t":"No external scanner dependency","why.c1.d":"A pure-Go native scanner reads the dpkg, apk and rpm databases directly. It works without the Trivy binary — a design with effectively zero runtime dependencies.",
    "why.c2.t":"Low false-positive rate","why.c2.d":"Real per-distro version algorithms (dpkg, rpmvercmp, apk, semver) plus epoch-loss tolerance and CPE matching gated by version range keep spurious alerts to a minimum.",
    "why.c3.t":"Self-hosted & airgap-ready","why.c3.d":"Your data never leaves your infrastructure. Export and import offline CVE DB bundles, with stale-bundle rejection to keep airgapped servers fresh.",
    "feat.eyebrow":"Features","feat.title":"Everything you need to keep watch","feat.subtitle":"From OS packages to runtimes installed outside the package manager — hosts and containers, all through one collection path.",
    "feat.native.t":"Native scanner","feat.native.d":"Pure Go parses the dpkg status and apk installed DB directly; rpm is read via the host or container rpm binary. The same ScanRoot entry point serves both hosts and container rootfs.",
    "feat.fp.t":"Low false positives","feat.fp.d":"Ecosystem-aware version comparison as a generalized ruleset: correct Debian backport-suffix ordering, distro epoch-loss tolerance, and NVD CPE matching gated by the affected version range.",
    "feat.runtime.t":"Runtime detection","feat.runtime.d":"Detects language runtimes installed outside the package manager — pyenv-Python, unpacked Node, hand-installed JDK and Go SDKs — purely from on-disk layout, never executing a binary.",
    "feat.facts.t":"Host / container facts","feat.facts.d":"Reads /proc, /sys and /etc directly to collect CPU, memory, DMI hardware, virtualization, network and OS facts into JSONB, surfaced transparently in the dashboard's System Facts card.",
    "feat.assignee.t":"Assignee workflow","feat.assignee.d":"Assign and filter an owner (담당자) per finding, with host-owner-based auto-assignment, so each vulnerability reaches the person responsible for it.",
    "feat.notify.t":"Notifications","feat.notify.d":"SMTP email, webhook and log channels, with per-rule recipients and scan.completed / scan.failed triggers so alerts go to exactly the right people.",
    "feat.airgap.t":"Airgap & self-hosted","feat.airgap.d":"Online installs auto-update on start and every six hours, retrying with exponential backoff on failure; airgapped sites import sha256-verified offline bundles.",
    "feat.cvedb.t":"Multi-source CVE DB","feat.cvedb.d":"Aggregates OSV, NVD, EPSS, CISA-KEV and the Trivy DB into one database, with matchable-row counts, EPSS merge rate and index coverage shown in the dashboard.",
    "arch.eyebrow":"Architecture","arch.title":"Agent → Server → Dashboard","arch.subtitle":"A simple, fully self-hostable three-stage pipeline, backed by a CVE database aggregated from authoritative sources.",
    "arch.agent.t":"Agent","arch.agent.d":"On each host and container, natively collects OS packages, language dependencies, runtimes and system facts, then reports them.",
    "arch.server.t":"Server + CVE DB","arch.server.d":"Matches packages to CVEs with ecosystem-aware version comparison, and handles RBAC, audit logging and SBOM export.",
    "arch.dash.t":"Dashboard","arch.dash.d":"A React dashboard to triage vulnerabilities and review assignees, host facts and CVE DB status at a glance.",
    "arch.srclabel":"CVE DB sources:",
    "arch.foot":"Stored in PostgreSQL · CycloneDX 1.5 / SPDX 2.3 SBOM export · Docker and airgapped deployment",
    "foot.tag":"Self-hosted package vulnerability monitoring, named after Korea's beacon-fire towers.",
    "foot.readme":"Docs","foot.issues":"Issues",
    "foot.copyright":"© 2026 The Bongsu project","foot.license":"MIT License"
  },
  zh:{
    "nav.why":"为何选择 Bongsu","nav.features":"功能","nav.arch":"架构",
    "hero.badge":"自托管 · 无需外部扫描器",
    "hero.tagline":"自托管平台，持续监控每台主机与容器的软件包漏洞",
    "hero.desc":"每台主机和容器上的代理收集已安装的软件包，服务端将其与权威 CVE 数据库进行匹配。正如其得名的烽燧台一样，Bongsu 将每一条警报直接传递给负责人。",
    "hero.cta1":"在 GitHub 查看","hero.cta2":"了解功能",
    "origin.title":"名字由来 — 烽燧臺",
    "origin.body":"Bongsu（봉수）得名于韩国历史上的烽燧台（봉수대，烽燧臺）——以烽火与狼烟在全国接力传递危险警报。一座烽燧台发现威胁，便把信号传给下一座，迅速将警报传遍全境——这正是一套持续监控并即时告警系统的贴切隐喻。",
    "why.eyebrow":"为何选择 Bongsu","why.title":"更少误报，没有盲区","why.subtitle":"基于权威数据得出准确结果，无需依赖外部扫描器——而且数据绝不离开你的基础设施。",
    "why.c1.t":"无外部扫描器依赖","why.c1.d":"纯 Go 原生扫描器直接读取 dpkg、apk、rpm 数据库。无需 Trivy 二进制即可运行——几乎零运行时依赖的设计。",
    "why.c2.t":"低误报率","why.c2.d":"采用各发行版真实的版本比较算法（dpkg、rpmvercmp、apk、semver），并容忍 epoch 缺失，CPE 匹配受版本范围约束，将虚假告警降到最低。",
    "why.c3.t":"自托管 · 支持隔离网络","why.c3.d":"数据绝不离开你的基础设施。支持离线 CVE 数据库包的导出与导入，并通过陈旧包拒绝机制保持隔离服务器的数据新鲜。",
    "feat.eyebrow":"功能","feat.title":"持续监控所需的一切","feat.subtitle":"从操作系统软件包到包管理器之外安装的运行时——主机与容器，统一走一条采集路径。",
    "feat.native.t":"原生扫描器","feat.native.d":"纯 Go 直接解析 dpkg status 与 apk installed 数据库；rpm 通过主机或容器的 rpm 二进制查询。同一个 ScanRoot 入口同时服务于主机和容器 rootfs。",
    "feat.fp.t":"低误报","feat.fp.d":"以通用规则集实现的、感知生态的版本比较：正确排序 Debian backport 后缀、容忍发行版 epoch 缺失，并以受影响版本范围约束 NVD CPE 匹配。",
    "feat.runtime.t":"运行时检测","feat.runtime.d":"检测包管理器之外安装的语言运行时——pyenv 编译的 Python、解压的 Node、手动安装的 JDK 与 Go SDK——完全依据磁盘布局推断，绝不执行任何二进制。",
    "feat.facts.t":"主机 / 容器 facts","feat.facts.d":"直接读取 /proc、/sys、/etc，将 CPU、内存、DMI 硬件、虚拟化、网络与操作系统信息收集为 JSONB，并在仪表盘的 System Facts 卡片中透明呈现。",
    "feat.assignee.t":"负责人工作流","feat.assignee.d":"可为每条 finding 指定并筛选负责人（담당자），支持基于主机归属的自动分配，让每个漏洞都到达真正负责的人手中。",
    "feat.notify.t":"通知","feat.notify.d":"支持 SMTP 邮件、webhook 与日志通道，可按规则配置收件人，并通过 scan.completed / scan.failed 触发，将告警精准送达相关人员。",
    "feat.airgap.t":"隔离网络 · 自托管","feat.airgap.d":"联网部署在启动时及每六小时自动更新，失败时以指数退避重试；隔离站点导入经 sha256 校验的离线数据包。",
    "feat.cvedb.t":"多来源 CVE 数据库","feat.cvedb.d":"将 OSV、NVD、EPSS、CISA-KEV 与 Trivy DB 汇聚为一个数据库，并在仪表盘展示可匹配行数、EPSS 合并率与索引覆盖率。",
    "arch.eyebrow":"架构","arch.title":"Agent → Server → Dashboard","arch.subtitle":"一条简单且完全可自托管的三段式流水线，由汇聚自权威来源的 CVE 数据库支撑。",
    "arch.agent.t":"代理","arch.agent.d":"在每台主机与容器上原生采集操作系统软件包、语言依赖、运行时及系统 facts，并上报。",
    "arch.server.t":"服务端 + CVE 数据库","arch.server.d":"以感知生态的版本比较将软件包匹配到 CVE，并处理 RBAC、审计日志与 SBOM 导出。",
    "arch.dash.t":"仪表盘","arch.dash.d":"React 仪表盘，一目了然地分流漏洞，查看负责人、主机 facts 与 CVE 数据库状态。",
    "arch.srclabel":"CVE 数据库来源：",
    "arch.foot":"存储于 PostgreSQL · CycloneDX 1.5 / SPDX 2.3 SBOM 导出 · 支持 Docker 与隔离网络部署",
    "foot.tag":"自托管软件包漏洞监控系统，得名于韩国的烽燧台。",
    "foot.readme":"文档","foot.issues":"问题反馈",
    "foot.copyright":"© 2026 Bongsu 项目","foot.license":"MIT 许可证"
  },
  ja:{
    "nav.why":"Bongsu の理由","nav.features":"機能","nav.arch":"アーキテクチャ",
    "hero.badge":"セルフホスト · 外部スキャナー不要",
    "hero.tagline":"すべてのホストとコンテナのパッケージ脆弱性を見張る、セルフホスト型監視プラットフォーム",
    "hero.desc":"各ホスト・コンテナのエージェントがインストール済みパッケージを収集し、サーバーが権威ある CVE データベースと照合します。その名の由来である烽燧台のように、Bongsu は各警報を担当者へとまっすぐ伝えます。",
    "hero.cta1":"GitHub で見る","hero.cta2":"機能を見る",
    "origin.title":"名前の由来 — 烽燧臺",
    "origin.body":"Bongsu（봉수）は、韓国の歴史的な烽燧台（봉수대、烽燧臺）に由来します。烽火と煙で危険の知らせを全国へ次々とリレーした施設です。ある台が脅威を察知すると次の台へ信号を伝え、警報を素早く全土へ届けました — 見張り、即座に警告するこのシステムにふさわしい比喩です。",
    "why.eyebrow":"Bongsu の理由","why.title":"誤検知を減らし、死角をなくす","why.subtitle":"外部スキャナーに頼らず、権威あるデータで正確に。そしてデータはインフラの外へ出ません。",
    "why.c1.t":"外部スキャナー依存なし","why.c1.d":"純 Go のネイティブスキャナーが dpkg・apk・rpm データベースを直接読み取ります。Trivy バイナリなしで動作する、実質ゼロ依存の設計です。",
    "why.c2.t":"低い誤検知率","why.c2.d":"ディストリ固有の実際のバージョン比較アルゴリズム（dpkg・rpmvercmp・apk・semver）に加え、epoch 欠落の許容とバージョン範囲でゲートした CPE マッチングで、誤った警報を最小化します。",
    "why.c3.t":"セルフホスト・エアギャップ対応","why.c3.d":"データはインフラの外へ出ません。オフライン用 CVE DB バンドルの export/import と、古いバンドルの拒否検証を備えます。",
    "feat.eyebrow":"機能","feat.title":"見張りに必要なすべて","feat.subtitle":"OS パッケージから、パッケージマネージャー外のランタイムまで。ホストもコンテナも、ひとつの収集経路で。",
    "feat.native.t":"ネイティブスキャナー","feat.native.d":"純 Go で dpkg status と apk installed DB を直接パースし、rpm はホストまたはコンテナの rpm バイナリで照会します。同じ ScanRoot 入口がホストとコンテナ rootfs の双方に使われます。",
    "feat.fp.t":"低い誤検知","feat.fp.d":"エコシステムを意識したバージョン比較を汎用ルールセットとして実装。Debian backport 接尾辞の正しい並び、ディストリ epoch 欠落の許容、影響バージョン範囲でゲートした NVD CPE マッチングを行います。",
    "feat.runtime.t":"ランタイム検出","feat.runtime.d":"パッケージマネージャー外にインストールされた言語ランタイム — pyenv の Python、展開した Node、手動導入の JDK・Go SDK — をディスク上の配置だけから検出し、バイナリは一切実行しません。",

    "hero.desc":"Un agent sur chaque hôte et conteneur recense les paquets installés, et le serveur les confronte à une base CVE faisant autorité. À l'image des tours à feu qui lui ont donné son nom, Bongsu relaie chaque alerte directement à la bonne personne.",
    "hero.cta1":"Voir sur GitHub","hero.cta2":"Découvrir les fonctionnalités",
    "origin.title":"L'origine du nom — 烽燧臺",
    "origin.body":"Bongsu (봉수) tient son nom des tours à feu historiques de Corée (봉수대, 烽燧臺), qui relayaient les alertes de danger à travers tout le pays par le feu et la fumée. Lorsqu'une tour repérait une menace, elle transmettait le signal à la suivante, propageant rapidement l'alarme dans tout le territoire — une métaphore parfaite pour un système qui surveille et alerte aussitôt.",
    "why.eyebrow":"Pourquoi Bongsu","why.title":"Moins de faux positifs, aucun angle mort","why.subtitle":"Des résultats précis issus de données faisant autorité, sans dépendre d'un scanner externe — et vos données ne quittent jamais votre infrastructure.",
    "why.c1.t":"Aucune dépendance à un scanner externe","why.c1.d":"Un scanner natif en pur Go lit directement les bases dpkg, apk et rpm. Il fonctionne sans le binaire Trivy — une conception pratiquement sans dépendance d'exécution.",
    "why.c2.t":"Faible taux de faux positifs","why.c2.d":"De vrais algorithmes de comparaison de versions par distribution (dpkg, rpmvercmp, apk, semver), la tolérance à la perte d'epoch et un appariement CPE borné par plage de versions réduisent les alertes erronées au minimum.",
    "why.c3.t":"Auto-hébergé et prêt pour l'airgap","why.c3.d":"Vos données ne quittent jamais votre infrastructure. Exportez et importez des bundles CVE hors ligne, avec rejet des bundles obsolètes pour garder les serveurs isolés à jour.",
    "feat.eyebrow":"Fonctionnalités","feat.title":"Tout ce qu'il faut pour rester vigilant","feat.subtitle":"Des paquets OS aux runtimes installés hors du gestionnaire de paquets — hôtes et conteneurs, par un seul chemin de collecte.",
    "feat.native.t":"Scanner natif","feat.native.d":"Du pur Go analyse directement le status dpkg et la base installed d'apk ; rpm est lu via le binaire rpm de l'hôte ou du conteneur. Le même point d'entrée ScanRoot sert les hôtes et le rootfs des conteneurs.",
    "feat.fp.t":"Peu de faux positifs","feat.fp.d":"Comparaison de versions sensible à l'écosystème, sous forme d'un ensemble de règles généralisé : tri correct des suffixes de backport Debian, tolérance à la perte d'epoch et appariement CPE NVD borné par la plage de versions affectée.",
    "feat.runtime.t":"Détection des runtimes","feat.runtime.d":"Détecte les runtimes de langage installés hors du gestionnaire de paquets — Python via pyenv, Node décompressé, JDK et SDK Go installés à la main — uniquement d'après l'agencement sur disque, sans jamais exécuter de binaire.",
    "feat.facts.t":"Facts hôte / conteneur","feat.facts.d":"Lit directement /proc, /sys et /etc pour collecter CPU, mémoire, matériel DMI, virtualisation, réseau et infos OS au format JSONB, présentés en toute transparence dans la carte System Facts du tableau de bord.",
    "feat.assignee.t":"Flux d'attribution","feat.assignee.d":"Attribuez et filtrez un responsable (담당자) par finding, avec attribution automatique basée sur le propriétaire de l'hôte, afin que chaque vulnérabilité atteigne la personne responsable.",
    "feat.notify.t":"Notifications","feat.notify.d":"Canaux e-mail SMTP, webhook et journal, avec destinataires par règle et déclencheurs scan.completed / scan.failed, pour que les alertes parviennent exactement aux bonnes personnes.",
    "feat.airgap.t":"Airgap et auto-hébergement","feat.airgap.d":"Les installations en ligne se mettent à jour au démarrage et toutes les six heures, avec relance en backoff exponentiel en cas d'échec ; les sites isolés importent des bundles hors ligne vérifiés par sha256.",
    "feat.cvedb.t":"Base CVE multi-sources","feat.cvedb.d":"Agrège OSV, NVD, EPSS, CISA-KEV et la Trivy DB en une seule base, avec le nombre de lignes exploitables, le taux de fusion EPSS et la couverture des index affichés dans le tableau de bord.",
    "arch.eyebrow":"Architecture","arch.title":"Agent → Serveur → Tableau de bord","arch.subtitle":"Un pipeline simple en trois étapes, entièrement auto-hébergeable, adossé à une base CVE agrégée de sources faisant autorité.",
    "arch.agent.t":"Agent","arch.agent.d":"Sur chaque hôte et conteneur, collecte nativement paquets OS, dépendances de langage, runtimes et facts système, puis les transmet.",
    "arch.server.t":"Serveur + base CVE","arch.server.d":"Apparie les paquets aux CVE par comparaison de versions sensible à l'écosystème, et gère RBAC, journalisation d'audit et export SBOM.",
    "arch.dash.t":"Tableau de bord","arch.dash.d":"Un tableau de bord React pour trier les vulnérabilités et consulter d'un coup d'œil responsables, facts hôtes et état de la base CVE.",

    "hero.cta1":"Auf GitHub ansehen","hero.cta2":"Funktionen entdecken",
    "origin.title":"Der Name — 烽燧臺",
    "origin.body":"Bongsu (봉수) ist nach den historischen koreanischen Signalfeuertürmen (봉수대, 烽燧臺) benannt, die Gefahrenwarnungen mit Feuer und Rauch landesweit weiterreichten. Erkannte ein Turm eine Bedrohung, gab er das Signal an den nächsten weiter und trug den Alarm rasch durchs ganze Land — ein treffendes Bild für ein System, das wacht und sofort alarmiert.",
    "why.eyebrow":"Warum Bongsu","why.title":"Weniger Fehlalarme, keine blinden Flecken","why.subtitle":"Präzise Ergebnisse aus maßgeblichen Daten, ohne Abhängigkeit von einem externen Scanner — und Ihre Daten verlassen nie Ihre Infrastruktur.",
    "why.c1.t":"Keine externe Scanner-Abhängigkeit","why.c1.d":"Ein nativer Scanner in reinem Go liest die dpkg-, apk- und rpm-Datenbanken direkt. Er läuft ohne das Trivy-Binary — ein Design mit praktisch null Laufzeitabhängigkeiten.",
    "why.c2.t":"Niedrige Fehlalarmrate","why.c2.d":"Echte distributionsspezifische Versionsalgorithmen (dpkg, rpmvercmp, apk, semver) sowie Toleranz gegenüber fehlendem Epoch und ein durch Versionsbereiche begrenzter CPE-Abgleich halten falsche Alarme minimal.",
    "why.c3.t":"Selbst gehostet & airgap-fähig","why.c3.d":"Ihre Daten verlassen nie Ihre Infrastruktur. Exportieren und importieren Sie Offline-CVE-DB-Bundles, mit Abweisung veralteter Bundles, damit isolierte Server aktuell bleiben.",
    "feat.eyebrow":"Funktionen","feat.title":"Alles, was zur Überwachung nötig ist","feat.subtitle":"Von OS-Paketen bis zu Runtimes außerhalb der Paketverwaltung — Hosts und Container über einen einzigen Erfassungspfad.",
    "feat.native.t":"Nativer Scanner","feat.native.d":"Reines Go parst dpkg status und die apk-installed-DB direkt; rpm wird über das rpm-Binary des Hosts oder Containers gelesen. Derselbe ScanRoot-Einstiegspunkt dient Hosts und Container-rootfs.",
    "feat.fp.t":"Wenige Fehlalarme","feat.fp.d":"Ökosystembewusster Versionsvergleich als verallgemeinertes Regelwerk: korrekte Sortierung von Debian-Backport-Suffixen, Toleranz gegenüber fehlendem Distro-Epoch und durch den betroffenen Versionsbereich begrenzter NVD-CPE-Abgleich.",
    "feat.runtime.t":"Runtime-Erkennung","feat.runtime.d":"Erkennt Sprach-Runtimes außerhalb der Paketverwaltung — pyenv-Python, entpacktes Node, von Hand installierte JDKs und Go-SDKs — allein anhand des Layouts auf der Platte, ohne je ein Binary auszuführen.",
    "feat.facts.t":"Host-/Container-Facts","feat.facts.d":"Liest /proc, /sys und /etc direkt und erfasst CPU, Speicher, DMI-Hardware, Virtualisierung, Netzwerk und OS-Infos als JSONB — transparent dargestellt in der System-Facts-Karte des Dashboards.",
    "feat.assignee.t":"Zuständigkeits-Workflow","feat.assignee.d":"Weisen Sie pro Finding einen Verantwortlichen (담당자) zu und filtern Sie danach, mit automatischer Zuweisung anhand des Host-Eigentümers, damit jede Schwachstelle die zuständige Person erreicht.",
    "feat.notify.t":"Benachrichtigungen","feat.notify.d":"SMTP-E-Mail-, Webhook- und Log-Kanäle mit regelbezogenen Empfängern und scan.completed-/scan.failed-Auslösern, damit Alarme genau die richtigen Personen erreichen.",
    "feat.airgap.t":"Airgap & selbst gehostet","feat.airgap.d":"Online-Installationen aktualisieren sich beim Start und alle sechs Stunden und wiederholen Versuche bei Fehlern mit exponentiellem Backoff; isolierte Standorte importieren sha256-verifizierte Offline-Bundles.",
    "feat.cvedb.t":"CVE-DB aus mehreren Quellen","feat.cvedb.d":"Bündelt OSV, NVD, EPSS, CISA-KEV und die Trivy DB in einer Datenbank, mit Anzahl matchbarer Zeilen, EPSS-Merge-Rate und Indexabdeckung im Dashboard.",
    "arch.eyebrow":"Architektur","arch.title":"Agent → Server → Dashboard","arch.subtitle":"Eine einfache, vollständig selbst hostbare dreistufige Pipeline, gestützt auf eine aus maßgeblichen Quellen aggregierte CVE-Datenbank.",
    "arch.agent.t":"Agent","arch.agent.d":"Erfasst auf jedem Host und Container nativ OS-Pakete, Sprachabhängigkeiten, Runtimes und System-Facts und meldet sie.",
    "arch.server.t":"Server + CVE-DB","arch.server.d":"Gleicht Pakete per ökosystembewusstem Versionsvergleich mit CVEs ab und übernimmt RBAC, Audit-Logging und SBOM-Export.",
    "arch.dash.t":"Dashboard","arch.dash.d":"Ein React-Dashboard, um Schwachstellen zu triagieren und Zuständige, Host-Facts und CVE-DB-Status auf einen Blick zu prüfen.",

const LANGS = [
  {code:"ko",label:"한국어"},
  {code:"en",label:"English"},
  {code:"zh",label:"中文"},
  {code:"ja",label:"日本語"},
  {code:"fr",label:"Français"},
  {code:"de",label:"Deutsch"},
  {code:"es",label:"Español"},
  {code:"pt",label:"Português"}
];

function applyLang(code){
  const dict = I18N[code] || I18N.en;
  document.documentElement.lang = code;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    if(dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.code === code);
  });
  try{ localStorage.setItem("bongsu-lang", code); }catch(e){}
}

function detectLang(){
  try{
    const saved = localStorage.getItem("bongsu-lang");
    if(saved && I18N[saved]) return saved;
  }catch(e){}
  const nav = (navigator.language || navigator.userLanguage || "").toLowerCase();
  const base = nav.split("-")[0];
  if(I18N[base]) return base;
  if(nav.startsWith("zh")) return "zh";
  // default Korean per project; fall back English if nav matches nothing known
  return "ko";
}

// build switcher
const sw = document.getElementById("langSwitch");
LANGS.forEach(l=>{
  const btn = document.createElement("button");
  btn.className = "lang-btn";
  btn.dataset.code = l.code;
  btn.textContent = l.label;
  btn.setAttribute("aria-label", l.label);
  btn.addEventListener("click", ()=>applyLang(l.code));
  sw.appendChild(btn);
});

applyLang(detectLang());
</script>
